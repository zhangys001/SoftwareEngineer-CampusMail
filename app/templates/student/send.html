{% extends "student/base.html" %}
{% block content %}
<div class="panel" style="max-width:600px;margin:20px auto;">
<h3>📮 预约寄件</h3>
<form method="POST" style="margin-top:16px;">
<div class="form-row">
<div class="form-group">
<label>寄件人姓名</label>
<input type="text" value="{{ user.name }}" readonly>
</div>
<div class="form-group">
<label>联系电话</label>
<input type="text" value="{{ user.phone or '' }}" readonly>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>收件人姓名 *</label>
<input type="text" name="receiver_name" required placeholder="请输入收件人姓名">
</div>
<div class="form-group">
<label>收件人电话 *</label>
<input type="text" name="receiver_phone" required placeholder="请输入收件人电话">
</div>
</div>
<div class="form-group">
<label>收件地址 *</label>
<input type="text" name="receiver_addr" required placeholder="请输入收件人详细地址">
</div>
<div class="form-row">
<div class="form-group">
<label>快递公司 *</label>
<select name="company_id" required>
{% for c in companies %}
<option value="{{ c.company_id }}">{{ c.company_name }}</option>
{% endfor %}
</select>
</div>
<div class="form-group">
<label>物品类型</label>
<select name="item_type">
<option value="document">文件</option>
<option value="clothing">衣物</option>
<option value="electronics">电子产品</option>
<option value="books">书籍</option>
<option value="other" selected>其他</option>
</select>
</div>
</div>
<button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:14px;">提交预约</button>
</form>
</div>
{% endblock %}
