{% extends "student/base.html" %}
{% block content %}
<div class="panel" style="max-width:500px;margin:20px auto;text-align:center;">
<h3>📱 取件码</h3>
<div style="background:#1a73e8;color:#fff;font-size:42px;font-weight:700;padding:30px;border-radius:16px;letter-spacing:10px;margin:24px 0;">
{{ package.pickup_code }}
</div>
<div style="font-size:14px;color:#555;margin-bottom:8px;">{{ package.company.company_name }} | {{ package.tracking_no }}</div>
<div style="font-size:13px;color:#888;">货架位置: {{ package.slot_code }}</div>
<div style="margin-top:24px;padding:12px;background:#f5f5f5;border-radius:8px;font-size:12px;color:#666;">
请将此取件码出示给驿站工作人员扫码核销
</div>
<div style="margin-top:16px;">
<a href="{{ url_for('student.packages') }}" class="btn btn-outline" style="padding:10px 30px;">返回快递列表</a>
</div>
</div>
{% endblock %}
