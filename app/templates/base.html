<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}校园快递收发系统{% endblock %}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;color:#333}
.topbar{background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:100}
.topbar h1{font-size:18px;font-weight:600}
.topbar a{color:#fff;text-decoration:none;font-size:13px;opacity:.9;padding:6px 12px;border-radius:6px;transition:.2s}
.topbar a:hover{background:rgba(255,255,255,.15)}
.main{max-width:1200px;margin:20px auto;padding:0 16px}
.panel{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
.panel h3{font-size:16px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #1a73e8}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:linear-gradient(135deg,#f8faff,#fff);border-radius:10px;padding:18px;text-align:center;border:1px solid #eef1f5}
.stat-card .num{font-size:28px;font-weight:700;color:#1a73e8}
.stat-card .label{font-size:12px;color:#888;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8faff;padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid #e0e0e0}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#fafcff}
.btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;margin:0 2px;transition:.2s;text-decoration:none;display:inline-block}
.btn-primary{background:#1a73e8;color:#fff}
.btn-success{background:#2e7d32;color:#fff}
.btn-warning{background:#e65100;color:#fff}
.btn-danger{background:#c62828;color:#fff}
.btn-outline{background:#fff;color:#1a73e8;border:1px solid #1a73e8}
.btn:hover{opacity:.85}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#1a73e8}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.flash{padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:13px}
.flash.success{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.flash.error{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-pending{background:#fff3e0;color:#e65100}
.tag-picked{background:#e8f5e9;color:#2e7d32}
.tag-normal{background:#e3f2fd;color:#1565c0}
.tag-full{background:#fbe9e7;color:#bf360c}
.tag-disabled{background:#f5f5f5;color:#999}
.sub-nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sub-nav a{padding:6px 14px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;font-size:12px;text-decoration:none;color:#333;transition:.2s}
.sub-nav a.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
@media(max-width:800px){.stats-row,.col2,.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
{% block navbar %}{% endblock %}
<div class="main">
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for cat, msg in messages %}
<div class="flash {{ cat }}">{{ msg }}</div>
{% endfor %}
{% endif %}
{% endwith %}
{% block content %}{% endblock %}
</div>
</body>
</html>
