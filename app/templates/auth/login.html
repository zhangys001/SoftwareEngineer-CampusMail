<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 校园快递收发系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);padding:40px;width:400px;max-width:90vw}
.login-box h1{text-align:center;font-size:22px;color:#333;margin-bottom:8px}
.login-box .subtitle{text-align:center;font-size:13px;color:#888;margin-bottom:30px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#555}
.form-group input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:.2s}
.form-group input:focus{border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.flash{padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;text-align:center}
.flash.error{background:#ffebee;color:#c62828}
.hint{text-align:center;margin-top:20px;font-size:12px;color:#aaa;line-height:1.8}
</style>
</head>
<body>
<div class="login-box">
<h1>📦 校园快递收发系统</h1>
<p class="subtitle">Campus Express Delivery System</p>
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for cat, msg in messages %}
<div class="flash {{ cat }}">{{ msg }}</div>
{% endfor %}
{% endif %}
{% endwith %}
<form method="POST">
<div class="form-group">
<label>账号</label>
<input type="text" name="username" placeholder="学号 / 工号 / 管理员账号" required autofocus>
</div>
<div class="form-group">
<label>密码</label>
<input type="password" name="password" placeholder="请输入密码" required>
</div>
<button type="submit" class="login-btn">登 录</button>
</form>
<div class="hint">
测试账号: student/123456 (学生) | staff/123456 (员工) | admin/123456 (管理员)
</div>
</div>
</body>
</html>
